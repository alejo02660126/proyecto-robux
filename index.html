<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator</title>

<style>

body{
background:yellow;
font-family:Arial;
text-align:center;
margin:0;
}

.titulo{
width:90%;
max-width:450px;
margin-top:10px;
}

.line{
display:flex;
justify-content:center;
gap:10px;
margin:6px;
flex-wrap:wrap;
}

img{
width:90px;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
transition:0.2s;
border:3px solid transparent;
cursor:pointer;
}

img:hover{
transform:scale(1.15);
}

.selected{
transform:scale(1.2);
border:3px solid cyan;
box-shadow:0 0 10px cyan;
}

/* BOTON */

.boton{
margin:20px;
padding:15px 40px;
font-size:20px;
background:blue;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.boton:hover{
transform:scale(1.1);
}

/* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.bar{
width:80%;
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.fill{
width:0%;
height:100%;
background:lime;
}

</style>
</head>
<body>

<img src="titulo.png" class="titulo">

<!-- SKIN -->
<div class="line">
<img src="SKIN1.png">
<img src="SKIN2.png">
<img src="SKIN3.png">
<img src="SKIN4.png">
</div>

<!-- ROBUX -->
<div class="line">

<img src="ROBUX3.PNG">
</div>

<!-- NOCHES -->
<div class="line">
<img src="NOCHES1.png">
<img src="NOCHES2.png">
<img src="NOCHES3.png">
</div>

<!-- CLASES -->
<div class="line">
<img src="CLASES1.PNG">
<img src="CLASES2.PNG">
<img src="CLASES3.PNG">
</div>

<div class="line">

<div class="line">

<!-- ESCAPA -->

</div>

<div class="line">
<img src="ESCAPA4.PNG">

<div class="line">

<!-- ROBA -->
<div class="line">
<img src="ROBA1.png">

</div>

<div class="line">

<div class="line">

<div class="line">

<!-- ACCE -->
<div class="line">
<img src="ACCE1.png">
<img src="ACCE2.png">
<img src="ACCE3.png">
<img src="ACCE4.png">
</div>

<!-- BRO -->
<div class="line">
<img src="BRO1.PNG">
<img src="BRO2.PNG">
<img src="BRO3.PNG">
<img src="BRO4.PNG">
</div>

<button class="boton" onclick="start()">GENERAR</button>


<div class="loader" id="loader">

<h2 id="texto">Conectando...</h2>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>


<script>

const imgs=document.querySelectorAll("img");

imgs.forEach(img=>{
img.addEventListener("click",()=>{
imgs.forEach(i=>i.classList.remove("selected"));
img.classList.add("selected");
});
});

function start(){

document.getElementById("loader").style.display="flex";

let fill=document.getElementById("fill");
let texto=document.getElementById("texto");

let p=0;

let inter=setInterval(()=>{

p+=4;

fill.style.width=p+"%";

if(p<30) texto.innerText="Conectando...";
else if(p<60) texto.innerText="Verificando...";
else if(p<90) texto.innerText="Generando...";
else{
texto.innerText="Completado";
clearInterval(inter);
}

},200);

}

</script>

</body>
</html>
