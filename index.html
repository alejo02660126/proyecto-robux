.line{
display:flex;
justify-content:center;

}

img{
width:90px;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
transition:0.2s;
border:3px solid transparent;
}

img:hover{
transform:scale(1.15);
}

.selected{
transform:scale(1.2);
border:3px solid cyan;
box-shadow:0 0 10px cyan;
}
