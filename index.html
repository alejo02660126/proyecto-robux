<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator</title>

<style>

body{
background:yellow;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

.titulo{
width:90%;
max-width:450px;
margin-top:15px;
}

/* GRID */

.grid{
display:flex;
flex-direction:column;
align-items:center;
}

.line{
display:flex;
justify-content:center;
gap:12px;
margin:6px;
flex-wrap:wrap;
}

img{
width:90px;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
transition:0.2s;
border:3px solid transparent;
cursor:pointer;
}

img:hover{
transform:scale(1.15);
}

.selected{
transform:scale(1.2);
border:3px solid cyan;
box-shadow:0 0 10px cyan;
}

/* BOTON */

.boton{
margin:20px;
padding:15px 40px;
font-size:20px;
background:blue;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.boton:hover{
transform:scale(1.1);
}

/* PANTALLA CARGA */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.bar{
width:80%;
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:20px;
}

.fill{
width:0%;
height:100%;
background:lime;
}

</style>
</head>
<body>

<img src="titulo.png" class="titulo">

<div class="grid">

<!-- SKIN -->

<div class="line">
<img src="skin1.png">
<img src="skin2.png">
<img src="skin3.png">
<img src="skin4.png">
</div>

<!-- ROBUX -->

<div class="line">
<img src="robux1.png">
<img src="robux2.png">
<img src="robux3.png">
</div>

<!-- NOCHES -->

<div class="line">
<img src="noches1.png">
<img src="noches2.png">
<img src="noches3.png">
</div>

<!-- CLASES -->

<div class="line">
<img src="clases1.png">
<img src="clases2.png">
<img src="clases3.png">
</div>

<div class="line">
<img src="clases4.png">
<img src="clases5.png">
</div>

<div class="line">
<img src="clases6.png">
<img src="clases7.png">
</div>

<!-- ESCAPA -->

<div class="line">
<img src="escapa1.png">
<img src="escapa2.png">
<img src="escapa3.png">
</div>

<div class="line">
<img src="escapa4.png">
<img src="escapa5.png">
<img src="escapa6.png">
</div>

<div class="line">
<img src="escapa8.png">
</div>

<!-- ROBA -->

<div class="line">
<img src="roba1.png">
<img src="roba2.png">
<img src="roba3.png">
<img src="roba4.png">
</div>

<div class="line">
<img src="roba5.png">
<img src="roba6.png">
<img src="roba7.png">
<img src="roba8.png">
</div>

<div class="line">
<img src="roba9.png">
<img src="roba10.png">
<img src="roba11.png">
<img src="roba12.png">
</div>

<div class="line">
<img src="roba13.png">
<img src="roba14.png">
<img src="roba15.png">
<img src="roba16.png">
</div>

<div class="line">
<img src="roba17.png">
<img src="roba18.png">
<img src="roba19.png">
</div>

<div class="line">
<img src="roba21.png">
</div>

<!-- ACCE -->

<div class="line">
<img src="acce1.png">
<img src="acce2.png">
<img src="acce3.png">
<img src="acce4.png">
</div>

<!-- BRO -->

<div class="line">
<img src="bro1.png">
<img src="bro2.png">
<img src="bro3.png">
<img src="bro4.png">
</div>

</div>

<button class="boton" onclick="start()">GENERAR</button>


<div class="loader" id="loader">

<h2 id="texto">Conectando...</h2>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>


<script>

const imgs = document.querySelectorAll("img");

imgs.forEach(img=>{
img.addEventListener("click",()=>{
imgs.forEach(i=>i.classList.remove("selected"));
img.classList.add("selected");
});
});

function start(){

document.getElementById("loader").style.display="flex";

let fill = document.getElementById("fill");
let texto = document.getElementById("texto");

let p = 0;

let inter = setInterval(()=>{

p+=4;

fill.style.width=p+"%";

if(p<30) texto.innerText="Conectando servidores...";
else if(p<60) texto.innerText="Verificando...";
else if(p<90) texto.innerText="Generando...";
else{
texto.innerText="Completado";
clearInterval(inter);
}

},200);

}

</script>

</body>
</html>
