.grid{
display:flex;

justify-content:center;

}

img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
transition:0.2s;
border:3px solid transparent;
}

img:active{
transform:scale(1.2);
border:3px solid cyan;
box-shadow:0 0 10px cyan;
}

.line{
width:100%;
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

</style>
</head>
