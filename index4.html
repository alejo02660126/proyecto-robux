<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selector</title>

<style>

body{
background:yellow;
font-family:Arial;
text-align:center;
margin:0;
padding:0;
}

/* TITULO */

.titulo{
width:90%;
max-width:450px;
margin-top:15px;
margin-bottom:10px;
}

/* GRID */

.grid{
display:flex;
flex-direction:column;
align-items:center;
}

/* LINEAS */

.line{
display:flex;
justify-content:center;
gap:12px;
margin:6px;
flex-wrap:wrap;
}

/* IMAGENES */

img{
width:90px;
height:auto;
border-radius:12px;
background:white;
padding:4px;
box-shadow:0 5px 10px rgba(0,0,0,0.5);
transition:0.2s;
border:3px solid transparent;
cursor:pointer;
}

/* HOVER PC */

img:hover{
transform:scale(1.15);
}

/* SELECCION */

.selected{
transform:scale(1.2);
border:3px solid cyan;
box-shadow:0 0 10px cyan;
}

/* BOTON */

.boton{
margin-top:20px;
margin-bottom:30px;
padding:15px 40px;
font-size:20px;
background:blue;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.boton:hover{
transform:scale(1.1);
background:darkblue;
}

/* PC MAS GRANDE */

@media (min-width:800px){

img{
width:120px;
}

.boton{
font-size:25px;
}

}

</style>
</head>
<body>

<img src="titulo.png" class="titulo">

<div class="grid" id="grid">

<button class="boton">GENERAR</button>

<script>

const images = document.querySelectorAll("img");

images.forEach(img => {

img.addEventListener("click", function(){

images.forEach(i => i.classList.remove("selected"));

this.classList.add("selected");

});

});

</script>

</body>
